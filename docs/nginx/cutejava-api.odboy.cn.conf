server {
    listen 443 ssl;
    server_name cutejava-api.odboy.cn;
    access_log  /var/log/cutejava-api.odboy.cn_access.log  main;
    charset utf-8;

    ssl_certificate     /usr/local/nginx/conf/ssl/odboy.cn.pem;
    ssl_certificate_key /usr/local/nginx/conf/ssl/odboy.cn.key;
    ssl_session_timeout 15m;
    ssl_protocols TLSV1 TLSv1.1 TLSv1.2;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_prefer_server_ciphers on;
    add_header X-Cache $upstream_cache_status;expires 12h;

    location / {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy true;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        chunked_transfer_encoding off;

        proxy_connect_timeout 600;
        proxy_pass http://127.0.0.1:8000;
    }
}